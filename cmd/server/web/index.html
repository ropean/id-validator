<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>中国居民身份证号验证 · 查询 · 生成 · 升级</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #07080a;
    --surface:   #101111;
    --card:      #1b1c1e;
    --border:    rgba(255,255,255,0.06);
    --border-md: rgba(255,255,255,0.10);
    --text:      #f9f9f9;
    --text-sec:  #9c9c9d;
    --text-dim:  #6a6b6c;
    --red:       #FF6363;
    --blue:      #55b3ff;
    --green:     #5fc992;
    --yellow:    #ffbc33;
    --shadow-ring: rgb(27,28,30) 0px 0px 0px 1px, rgb(7,8,10) 0px 0px 0px 1px inset;
    --shadow-btn:  rgba(255,255,255,0.05) 0px 1px 0px 0px inset, rgba(255,255,255,0.25) 0px 0px 0px 1px, rgba(0,0,0,0.2) 0px -1px 0px 0px inset;
    --font-feat:   "calt" 1, "kern" 1, "liga" 1, "ss03" 1;
    --header-h: 69px;
    --footer-h: 48px;
  }

  html { font-size: 16px; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', -apple-system, sans-serif;
    font-feature-settings: var(--font-feat);
    letter-spacing: 0.2px;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    display: flex;
    flex-direction: column;
  }

  /* ── Layout ── */
  .container {
    max-width: 860px;
    margin: 0 auto;
    padding: 0 24px;
  }

  /* ── Header ── */
  header {
    border-bottom: 1px solid var(--border);
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    z-index: 100;
    background: rgba(7,8,10,0.85);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
  }
  .header-inner {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 16px 0;
  }
  .logo {
    flex-shrink: 0;
    width: 28px;
    height: 28px;
  }
  .header-text { flex: 1; }
  .header-title {
    font-size: 18px;
    font-weight: 500;
    color: var(--text);
    line-height: 1.2;
    letter-spacing: 0.2px;
  }
  .header-sub {
    font-size: 12px;
    color: var(--text-sec);
    letter-spacing: 0.3px;
    margin-top: 2px;
  }
  .github-link {
    display: flex;
    align-items: center;
    gap: 6px;
    color: var(--text-dim);
    text-decoration: none;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.2px;
    transition: opacity 0.2s;
    flex-shrink: 0;
  }
  .github-link:hover { opacity: 0.6; color: var(--text); }



  /* ── Page body ── */
  .page-body {
    flex: 1;
    display: flex;
    align-items: center;
    padding-top: calc(var(--header-h) + 24px);
    padding-bottom: calc(var(--footer-h) + 24px);
  }
  .page-body > .container { width: 100%; }

  /* ── Main ── */
  main { padding: 0; }

  /* ── Cards ── */
  .cards { display: flex; flex-direction: column; gap: 10px; }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    box-shadow: var(--shadow-ring);
    overflow: hidden;
    transition: border-color 0.2s, box-shadow 0.2s;
    cursor: pointer;
  }
  .card:hover { border-color: rgba(255,255,255,0.1); }
  .card.active { cursor: default; }
  .card.active-validate { border-color: rgba(85,179,255,0.25); border-left: 3px solid var(--blue); }
  .card.active-info     { border-color: rgba(95,201,146,0.25); border-left: 3px solid var(--green); }
  .card.active-fake     { border-color: rgba(255,188,51,0.25); border-left: 3px solid var(--yellow); }
  .card.active-upgrade  { border-color: rgba(255,99,99,0.25);  border-left: 3px solid var(--red); }

  .card-header {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 18px 20px;
    user-select: none;
  }
  .card-icon {
    width: 36px;
    height: 36px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .icon-validate { background: rgba(85,179,255,0.1); }
  .icon-info     { background: rgba(95,201,146,0.1); }
  .icon-fake     { background: rgba(255,188,51,0.1); }
  .icon-upgrade  { background: rgba(255,99,99,0.1); }

  .card-title-wrap { flex: 1; }
  .card-title {
    font-size: 15px;
    font-weight: 500;
    color: var(--text);
    letter-spacing: 0.2px;
    line-height: 1.2;
  }
  .card-desc {
    font-size: 13px;
    color: var(--text-sec);
    margin-top: 3px;
    letter-spacing: 0.2px;
  }
  .card-chevron {
    color: var(--text-dim);
    transition: transform 0.25s ease, opacity 0.2s;
    flex-shrink: 0;
  }
  .card.active .card-chevron { transform: rotate(180deg); opacity: 0; }

  /* ── Card body ── */
  .card-body {
    display: none;
    padding: 0 20px 20px;
    border-top: 1px solid var(--border);
  }
  .card.active .card-body { display: block; }

  .form-group { margin-top: 16px; }
  .form-label {
    display: block;
    font-size: 12px;
    font-weight: 500;
    color: var(--text-sec);
    letter-spacing: 0.3px;
    margin-bottom: 6px;
  }
  .form-input {
    width: 100%;
    background: var(--bg);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 8px;
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    font-weight: 500;
    padding: 10px 14px;
    outline: none;
    transition: border-color 0.15s, box-shadow 0.15s;
    letter-spacing: 0.2px;
  }
  .form-input::placeholder { color: var(--text-dim); }
  .form-input:focus {
    border-color: rgba(85,179,255,0.4);
    box-shadow: 0 0 0 3px hsla(202,100%,67%,0.1);
  }

  /* ── Toggle ── */
  .toggle-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-top: 14px;
  }
  .toggle-label {
    font-size: 13px;
    font-weight: 500;
    color: var(--text-sec);
    letter-spacing: 0.2px;
    cursor: pointer;
    user-select: none;
  }
  .toggle {
    position: relative;
    width: 36px;
    height: 20px;
    cursor: pointer;
    flex-shrink: 0;
  }
  .toggle input { opacity: 0; width: 0; height: 0; position: absolute; }
  .toggle-track {
    position: absolute;
    inset: 0;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 20px;
    transition: background 0.2s;
  }
  .toggle input:checked + .toggle-track { background: rgba(85,179,255,0.35); border-color: rgba(85,179,255,0.5); }
  .toggle-thumb {
    position: absolute;
    top: 3px;
    left: 3px;
    width: 12px;
    height: 12px;
    background: #fff;
    border-radius: 50%;
    transition: transform 0.2s;
    pointer-events: none;
  }
  .toggle input:checked ~ .toggle-thumb { transform: translateX(16px); }

  /* ── Action row ── */
  .action-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-top: 16px;
  }
  .btn-primary {
    background: hsla(0,0%,100%,0.09);
    border: none;
    border-radius: 86px;
    color: var(--text);
    cursor: pointer;
    font-family: inherit;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.3px;
    padding: 9px 22px;
    box-shadow: var(--shadow-btn);
    transition: opacity 0.2s;
  }
  .btn-primary:hover { opacity: 0.6; }
  .btn-primary:disabled { opacity: 0.3; cursor: not-allowed; }

  /* ── Result ── */
  .result-wrap { margin-top: 16px; }

  .result-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    border-radius: 6px;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.2px;
    padding: 4px 10px;
    margin-bottom: 10px;
  }
  .badge-valid   { background: rgba(95,201,146,0.12); color: var(--green); border: 1px solid rgba(95,201,146,0.2); }
  .badge-invalid { background: rgba(255,99,99,0.12);  color: var(--red);   border: 1px solid rgba(255,99,99,0.2); }

  .result-code {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 16px;
    font-family: 'Courier New', 'Consolas', monospace;
    font-size: 13px;
    line-height: 1.6;
    color: #c8d3f5;
    white-space: pre-wrap;
    word-break: break-all;
    overflow-x: auto;
    position: relative;
  }

  .result-id {
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 16px;
  }
  .result-id-text {
    flex: 1;
    font-family: 'Courier New', 'Consolas', monospace;
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
    letter-spacing: 1px;
    word-break: break-all;
  }
  .btn-copy {
    background: transparent;
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 6px;
    color: var(--text-sec);
    cursor: pointer;
    font-family: inherit;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.3px;
    padding: 5px 10px;
    transition: opacity 0.2s;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .btn-copy:hover { opacity: 0.6; color: var(--text); }
  .btn-copy.copied { color: var(--green); border-color: rgba(95,201,146,0.3); }

  /* ── Error ── */
  .error-box {
    background: rgba(255,99,99,0.07);
    border: 1px solid rgba(255,99,99,0.2);
    border-radius: 8px;
    color: var(--red);
    font-size: 13px;
    font-weight: 500;
    padding: 12px 14px;
    letter-spacing: 0.2px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  /* ── Spinner ── */
  .spinner {
    width: 18px;
    height: 18px;
    animation: spin 0.7s linear infinite;
    flex-shrink: 0;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Info grid ── */
  .info-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-top: 2px;
  }
  .info-row {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px 12px;
  }
  .info-key {
    font-size: 11px;
    font-weight: 600;
    color: var(--text-dim);
    letter-spacing: 0.4px;
    text-transform: uppercase;
    margin-bottom: 3px;
  }
  .info-val {
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
    letter-spacing: 0.2px;
    word-break: break-all;
  }
  .info-row.full-width { grid-column: 1 / -1; }

  /* ── Footer ── */
  footer {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    z-index: 100;
    height: var(--footer-h);
    border-top: 1px solid var(--border);
    background: rgba(7,8,10,0.9);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    display: flex;
    align-items: center;
  }
  .footer-inner {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
  }
  .footer-security {
    display: flex;
    align-items: center;
    gap: 7px;
    font-size: 12px;
    color: var(--text-dim);
    letter-spacing: 0.25px;
    min-width: 0;
  }
  .footer-security svg { flex-shrink: 0; opacity: 0.6; }
  .footer-security span { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .footer-text-short { display: none; }
  .footer-meta {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    color: var(--text-dim);
    white-space: nowrap;
    flex-shrink: 0;
    letter-spacing: 0.25px;
  }
  .footer-meta a {
    color: var(--text-dim);
    text-decoration: none;
    transition: color 0.15s;
  }
  .footer-meta a:hover { color: var(--text-sec); }
  .footer-dot { opacity: 0.3; }

  /* ── Responsive ── */
  @media (max-width: 600px) {
    .container { padding: 0 16px; }
    .header-sub { display: none; }
    .github-link span { display: none; }
    .info-grid { grid-template-columns: 1fr; }
    .footer-meta { display: none; }
    .footer-text-full { display: none; }
    .footer-text-short { display: inline; }
  }
  @media (max-width: 375px) {
    .card-desc { display: none; }
  }
</style>
</head>
<body>

<header>
  <div class="container">
    <div class="header-inner">
      <img class="logo" src="/favicon.svg" alt="logo">
      <div class="header-text">
        <div class="header-title">身份证工具</div>
        <div class="header-sub">中国居民身份证号验证 · 查询 · 生成 · 升级</div>
      </div>
      <a class="github-link" href="https://github.com/ropean/id-validator" target="_blank" rel="noopener">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
          <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38
            0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13
            -.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07
            -1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12
            0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82
            2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54
            1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/>
        </svg>
        <span>ropean/id-validator</span>
      </a>
    </div>
  </div>
</header>

<div class="page-body">
<div class="container">
  <main>
    <div class="cards">

      <!-- ── Card 1: Validate ── -->
      <div class="card" id="card-validate" onclick="toggleCard('validate')">
        <div class="card-header">
          <div class="card-icon icon-validate">
            <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
              <path d="M10 2L3.5 5v5c0 3.87 2.79 7.5 6.5 8.5 3.71-1 6.5-4.63 6.5-8.5V5L10 2z"
                stroke="#55b3ff" stroke-width="1.5" stroke-linejoin="round" fill="rgba(85,179,255,0.1)"/>
              <path d="M7 10l2 2 4-4" stroke="#55b3ff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
          <div class="card-title-wrap">
            <div class="card-title">验证</div>
            <div class="card-desc">校验身份证号合法性</div>
          </div>
          <svg class="card-chevron" width="16" height="16" viewBox="0 0 16 16" fill="none">
            <path d="M4 6l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <div class="card-body" id="body-validate" onclick="event.stopPropagation()">
          <div class="form-group">
            <label class="form-label" for="val-id">身份证号</label>
            <input class="form-input" id="val-id" type="text" placeholder="输入 15 或 18 位身份证号" maxlength="20" autocomplete="off"
              onkeydown="if(event.key==='Enter') runValidate()">
          </div>
          <div class="toggle-row">
            <label class="toggle" for="val-strict">
              <input type="checkbox" id="val-strict">
              <div class="toggle-track"></div>
              <div class="toggle-thumb"></div>
            </label>
            <label class="toggle-label" for="val-strict">严格模式（校验地址码时效性）</label>
          </div>
          <div class="action-row">
            <button class="btn-primary" onclick="runValidate()">验 证</button>
          </div>
          <div class="result-wrap" id="result-validate"></div>
        </div>
      </div>

      <!-- ── Card 2: Info ── -->
      <div class="card" id="card-info" onclick="toggleCard('info')">
        <div class="card-header">
          <div class="card-icon icon-info">
            <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
              <rect x="2.5" y="4" width="15" height="12" rx="2" stroke="#5fc992" stroke-width="1.5" fill="rgba(95,201,146,0.08)"/>
              <circle cx="7" cy="9.5" r="2" stroke="#5fc992" stroke-width="1.3"/>
              <path d="M5 14c0-1.1.9-2 2-2s2 .9 2 2" stroke="#5fc992" stroke-width="1.3" stroke-linecap="round"/>
              <path d="M12 8.5h3M12 11.5h2" stroke="#5fc992" stroke-width="1.3" stroke-linecap="round"/>
            </svg>
          </div>
          <div class="card-title-wrap">
            <div class="card-title">查询</div>
            <div class="card-desc">获取身份证详细信息</div>
          </div>
          <svg class="card-chevron" width="16" height="16" viewBox="0 0 16 16" fill="none">
            <path d="M4 6l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <div class="card-body" id="body-info" onclick="event.stopPropagation()">
          <div class="form-group">
            <label class="form-label" for="info-id">身份证号</label>
            <input class="form-input" id="info-id" type="text" placeholder="输入 15 或 18 位身份证号" maxlength="20" autocomplete="off"
              onkeydown="if(event.key==='Enter') runInfo()">
          </div>
          <div class="toggle-row">
            <label class="toggle" for="info-strict">
              <input type="checkbox" id="info-strict">
              <div class="toggle-track"></div>
              <div class="toggle-thumb"></div>
            </label>
            <label class="toggle-label" for="info-strict">严格模式</label>
          </div>
          <div class="action-row">
            <button class="btn-primary" onclick="runInfo()">查 询</button>
          </div>
          <div class="result-wrap" id="result-info"></div>
        </div>
      </div>

      <!-- ── Card 3: Fake ── -->
      <div class="card" id="card-fake" onclick="toggleCard('fake')">
        <div class="card-header">
          <div class="card-icon icon-fake">
            <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
              <path d="M10 3v1.5M10 15.5V17M3 10h1.5M15.5 10H17M5.05 5.05l1.06 1.06M13.9 13.9l1.05 1.05M5.05 14.95l1.06-1.06M13.9 6.1l1.05-1.06"
                stroke="#ffbc33" stroke-width="1.4" stroke-linecap="round"/>
              <circle cx="10" cy="10" r="3" stroke="#ffbc33" stroke-width="1.5" fill="rgba(255,188,51,0.12)"/>
            </svg>
          </div>
          <div class="card-title-wrap">
            <div class="card-title">生成</div>
            <div class="card-desc">生成可通过校验的假号码</div>
          </div>
          <svg class="card-chevron" width="16" height="16" viewBox="0 0 16 16" fill="none">
            <path d="M4 6l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <div class="card-body" id="body-fake" onclick="event.stopPropagation()">
          <div class="action-row" style="margin-top: 4px;">
            <button class="btn-primary" onclick="runFake()">随机生成</button>
          </div>
          <div class="result-wrap" id="result-fake"></div>
        </div>
      </div>

      <!-- ── Card 4: Upgrade ── -->
      <div class="card" id="card-upgrade" onclick="toggleCard('upgrade')">
        <div class="card-header">
          <div class="card-icon icon-upgrade">
            <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
              <path d="M10 14V6" stroke="#FF6363" stroke-width="1.5" stroke-linecap="round"/>
              <path d="M7 9l3-3 3 3" stroke="#FF6363" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M4 16h12" stroke="#FF6363" stroke-width="1.5" stroke-linecap="round" opacity="0.45"/>
              <rect x="2.5" y="3" width="6" height="3.5" rx="1" stroke="#FF6363" stroke-width="1.2" opacity="0.5"/>
              <rect x="11.5" y="3" width="6" height="3.5" rx="1" stroke="#FF6363" stroke-width="1.2"/>
            </svg>
          </div>
          <div class="card-title-wrap">
            <div class="card-title">升级</div>
            <div class="card-desc">15 位号码升级为 18 位</div>
          </div>
          <svg class="card-chevron" width="16" height="16" viewBox="0 0 16 16" fill="none">
            <path d="M4 6l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <div class="card-body" id="body-upgrade" onclick="event.stopPropagation()">
          <div class="form-group">
            <label class="form-label" for="up-id">15 位身份证号</label>
            <input class="form-input" id="up-id" type="text" placeholder="输入旧版 15 位身份证号" maxlength="15" autocomplete="off"
              onkeydown="if(event.key==='Enter') runUpgrade()">
          </div>
          <div class="action-row">
            <button class="btn-primary" onclick="runUpgrade()">升 级</button>
          </div>
          <div class="result-wrap" id="result-upgrade"></div>
        </div>
      </div>

    </div>
  </main>
</div>
</div>

<footer>
  <div class="container">
    <div class="footer-inner">
      <div class="footer-security">
        <svg width="13" height="13" viewBox="0 0 20 20" fill="none">
          <path d="M10 2L3.5 5.5v4.5c0 4 2.9 7.74 6.5 8.75 3.6-1.01 6.5-4.75 6.5-8.75V5.5L10 2z"
            stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/>
          <path d="M7.5 10.5l2 2 3-3.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span class="footer-text-full">数据安全 &mdash; 本工具在您自己的浏览器上运行，不收集、不存储任何输入信息，所有处理均在本地完成</span>
        <span class="footer-text-short">数据安全 &middot; 不收集不存储任何输入信息</span>
      </div>
      <div class="footer-meta">
        <a href="https://github.com/ropean/id-validator" target="_blank" rel="noopener">MIT License</a>
        <span class="footer-dot">&middot;</span>
        <span>仅供学习研究</span>
      </div>
    </div>
  </div>
</footer>

<script>
  function getBase() { return ''; }

  // ── Card toggle ──
  const cards = ['validate','info','fake','upgrade'];
  let active = null;

  function toggleCard(id) {
    if (active === id) { closeCard(id); active = null; return; }
    if (active) closeCard(active);
    openCard(id);
    active = id;
  }

  function openCard(id) {
    const el = document.getElementById('card-' + id);
    el.classList.add('active', 'active-' + id);
  }
  function closeCard(id) {
    const el = document.getElementById('card-' + id);
    el.classList.remove('active', 'active-' + id);
  }

  // ── Helpers ──
  function spinner() {
    return `<svg class="spinner" viewBox="0 0 20 20" fill="none">
      <circle cx="10" cy="10" r="7" stroke="rgba(255,255,255,0.12)" stroke-width="2"/>
      <path d="M10 3a7 7 0 0 1 7 7" stroke="#9c9c9d" stroke-width="2" stroke-linecap="round"/>
    </svg>`;
  }

  function setLoading(el) {
    el.innerHTML = `<div style="display:flex;align-items:center;gap:8px;padding:12px 0;color:var(--text-sec);font-size:13px;">
      ${spinner()} 请求中…
    </div>`;
  }

  function setError(el, msg) {
    el.innerHTML = `<div class="error-box">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none" style="flex-shrink:0">
        <circle cx="8" cy="8" r="6.5" stroke="#FF6363" stroke-width="1.2"/>
        <path d="M8 5v3.5M8 11v.5" stroke="#FF6363" stroke-width="1.4" stroke-linecap="round"/>
      </svg>
      ${escHtml(msg)}
    </div>`;
  }

  function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function copyBtn(text) {
    const id = 'copy_' + Math.random().toString(36).slice(2);
    return { id, html: `<button class="btn-copy" id="${id}" onclick="doCopy('${id}', \`${escHtml(text)}\`)">复制</button>` };
  }

  function doCopy(btnId, text) {
    navigator.clipboard.writeText(text).then(() => {
      const b = document.getElementById(btnId);
      if (!b) return;
      b.textContent = '已复制';
      b.classList.add('copied');
      setTimeout(() => { b.textContent = '复制'; b.classList.remove('copied'); }, 1500);
    });
  }

  // ── Validate ──
  async function runValidate() {
    const id = document.getElementById('val-id').value.trim();
    const strict = document.getElementById('val-strict').checked;
    const out = document.getElementById('result-validate');
    if (!id) { setError(out, '请输入身份证号'); return; }
    setLoading(out);
    try {
      const r = await fetch(`${getBase()}/validate?id=${encodeURIComponent(id)}&strict=${strict}`);
      const j = await r.json();
      const valid = j.data === true;
      const cb = copyBtn(id);
      out.innerHTML = `
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px;">
          <span class="result-badge ${valid ? 'badge-valid' : 'badge-invalid'}">
            ${valid
              ? '<svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M2.5 6l2.5 2.5 4.5-4.5" stroke="#5fc992" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg> 合法'
              : '<svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M3 3l6 6M9 3l-6 6" stroke="#FF6363" stroke-width="1.5" stroke-linecap="round"/></svg> 非法'}
          </span>
        </div>
        <div class="result-id">
          <span class="result-id-text">${escHtml(id)}</span>
          ${cb.html}
        </div>`;
    } catch(e) {
      setError(out, '请求失败：' + e.message + '（检查 API 地址和服务是否运行）');
    }
  }

  // ── Info ──
  const INFO_LABELS = {
    AddressCode: '地址码', Abandoned: '地址码状态', Address: '地址',
    AddressTree: '省市区', Birthday: '出生日期', Constellation: '星座',
    ChineseZodiac: '生肖', Sex: '性别', Length: '号码位数', CheckBit: '校验码'
  };

  async function runInfo() {
    const id = document.getElementById('info-id').value.trim();
    const strict = document.getElementById('info-strict').checked;
    const out = document.getElementById('result-info');
    if (!id) { setError(out, '请输入身份证号'); return; }
    setLoading(out);
    try {
      const r = await fetch(`${getBase()}/info?id=${encodeURIComponent(id)}&strict=${strict}`);
      const j = await r.json();
      if (!j.success) { setError(out, j.error || '无效的身份证号'); return; }
      const d = j.data;

      // Format fields
      const fmt = {
        AddressCode: d.AddressCode,
        Abandoned: d.Abandoned === 1 ? '已废弃' : '使用中',
        Address: d.Address,
        AddressTree: Array.isArray(d.AddressTree) ? d.AddressTree.filter(Boolean).join(' / ') : d.AddressTree,
        Birthday: d.Birthday ? d.Birthday.split('T')[0] : '—',
        Constellation: d.Constellation,
        ChineseZodiac: d.ChineseZodiac,
        Sex: d.Sex === 1 ? '男 ♂' : '女 ♀',
        Length: d.Length + ' 位',
        CheckBit: d.CheckBit
      };

      let rows = '';
      for (const [k, v] of Object.entries(fmt)) {
        const full = (k === 'Address' || k === 'AddressTree') ? ' full-width' : '';
        rows += `<div class="info-row${full}">
          <div class="info-key">${INFO_LABELS[k] || k}</div>
          <div class="info-val">${escHtml(String(v ?? '—'))}</div>
        </div>`;
      }
      out.innerHTML = `<div class="info-grid">${rows}</div>`;
    } catch(e) {
      setError(out, '请求失败：' + e.message);
    }
  }

  // ── Fake ──
  async function runFake() {
    const out = document.getElementById('result-fake');
    setLoading(out);
    try {
      const r = await fetch(`${getBase()}/fake`);
      const j = await r.json();
      const id = j.data;
      const cb = copyBtn(id);
      out.innerHTML = `<div class="result-id">
        <span class="result-id-text">${escHtml(id)}</span>
        ${cb.html}
      </div>`;
    } catch(e) {
      setError(out, '请求失败：' + e.message);
    }
  }

  // ── Upgrade ──
  async function runUpgrade() {
    const id = document.getElementById('up-id').value.trim();
    const out = document.getElementById('result-upgrade');
    if (!id) { setError(out, '请输入 15 位身份证号'); return; }
    setLoading(out);
    try {
      const r = await fetch(`${getBase()}/upgrade?id=${encodeURIComponent(id)}`);
      const j = await r.json();
      if (!j.success) { setError(out, j.error || '升级失败'); return; }
      const upgraded = j.data;
      const cb = copyBtn(upgraded);
      out.innerHTML = `
        <div style="display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text-dim);margin-bottom:8px;letter-spacing:0.3px;">
          <span style="font-family:monospace;color:var(--text-sec);">${escHtml(id)}</span>
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
            <path d="M3 7h8M8 4l3 3-3 3" stroke="#9c9c9d" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <span style="color:var(--green);font-weight:600;">18 位</span>
        </div>
        <div class="result-id">
          <span class="result-id-text">${escHtml(upgraded)}</span>
          ${cb.html}
        </div>`;
    } catch(e) {
      setError(out, '请求失败：' + e.message);
    }
  }
</script>
</body>
</html>
